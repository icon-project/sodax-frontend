name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash(pnpm lint),Bash(pnpm build:packages),Bash(pnpm checkTs),Bash(pnpm test),Bash(pnpm run *)"
            --system-prompt "You are working on sodax-frontend, a TypeScript monorepo using pnpm workspaces. Key packages: @sodax/sdk (packages/sdk), @sodax/types (packages/types), @sodax/dapp-kit (packages/wallet-dapp-kit), apps/web (Next.js app). Use pnpm for all package management. Follow Biome linting rules (biome.json at repo root). Use strict TypeScript with ESM imports (.js extensions in source). When implementing features, prefer editing existing files over creating new ones. Keep changes focused and avoid over-engineering."
